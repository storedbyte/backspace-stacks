services:
  stirling-pdf:
    image: frooodle/s-pdf:latest
    container_name: stirling-pdf
    restart: unless-stopped
    ports:
      - "8084:8080"
    volumes:
      - /mnt/data/stirling-pdf/trainingData:/usr/share/tessdata
      - /mnt/data/stirling-pdf/extraConfigs:/configs
      - /mnt/data/stirling-pdf/logs:/logs
    environment:
      DOCKER_ENABLE_SECURITY: "false"
