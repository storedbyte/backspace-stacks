services:
  syncthing:
    image: lscr.io/linuxserver/syncthing:latest
    container_name: syncthing
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/New_York
    volumes:
      - /mnt/data/syncthing:/data
      - /mnt/data/syncthing/config:/config
      - /mnt/data/glance/config:/sync/glance-config
      - /mnt/data/glance/assets:/sync/glance-assets
      - /mnt/data/tommyfox-cv:/sync/tommyfox-cv
    ports:
      - 8384:8384
      - 22000:22000/tcp
      - 22000:22000/udp
      - 21027:21027/udp
