services:
  outline:
    image: docker.getoutline.com/outlinewiki/outline:latest
    environment:
      SECRET_KEY: ${SECRET_KEY}
      UTILS_SECRET: ${UTILS_SECRET}
      URL: "https://outline.bkspc.cc"
      DATABASE_URL: "postgres://user:${POSTGRES_PASSWORD}@postgres:5432/outline"
      PGSSLMODE: "disable"
      REDIS_URL: "redis://redis:6379"
      SMTP_HOST: "smtp.startmail.com"
      SMTP_PORT: "465"
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: "postmaster@bkspc.cc"
      SMTP_SECURE: "true"
      FILE_STORAGE: "local"
      FILE_STORAGE_LOCAL_ROOT_DIR: "/var/lib/outline/data"
      FILE_STORAGE_UPLOAD_MAX_SIZE: "262144000"
      DEFAULT_LANGUAGE: "en_US"
      FORCE_HTTPS: "false"
      ENABLE_UPDATES: "false"
      WEB_CONCURRENCY: "1"
    expose:
      - "3000"
    ports:
      - "3000:3000"
    volumes:
      - /mnt/data/outline/storage:/var/lib/outline/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
  redis:
    image: redis
    expose:
      - "6379"
    command: ["redis-server"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 3
    restart: unless-stopped
  postgres:
    image: postgres:16
    expose:
      - "5432"
    volumes:
      - /mnt/data/outline/database:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "outline", "-U", "user"]
      interval: 30s
      timeout: 20s
      retries: 3
    environment:
      POSTGRES_USER: "user"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: "outline"
    restart: unless-stopped
